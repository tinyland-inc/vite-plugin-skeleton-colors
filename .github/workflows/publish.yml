name: Publish
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run without publishing"
        required: false
        type: boolean
        default: true
permissions:
  actions: read
  contents: read
  id-token: write
  packages: write
jobs:
  package:
    uses: tinyland-inc/ci-templates/.github/workflows/js-bazel-package.yml@82308d060a1a6051058659ac2d4f2edb5d6be9fe
    with:
      runner_mode: shared
      shared_runner_labels_json: ${{ vars.PRIMARY_LINUX_RUNNER_LABELS_JSON }}
      runner_labels_json: ${{ vars.PRIMARY_LINUX_RUNNER_LABELS_JSON }}
      workspace_mode: isolated
      publish_mode: same_runner
      node_versions: '["22"]'
      publish_node_version: "22"
      pnpm_version: "10.13.1"
      typecheck_command: pnpm typecheck
      unit_test_command: pnpm test
      build_command: pnpm build
      package_check_command: pnpm check:package
      bazel_targets: "//:pkg //:test"
      package_dir: ./bazel-bin/pkg
      npm_access: public
      github_package_name: "@tinyland-inc/vite-plugin-skeleton-colors"
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      TINYLAND_GITHUB_PACKAGES_TOKEN: ${{ secrets.TINYLAND_GITHUB_PACKAGES_TOKEN }}
